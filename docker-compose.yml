version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flask-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flask_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flask:
    build: .
    container_name: flask-app
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/flask_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uv run gunicorn --bind 0.0.0.0:5000 --workers 4 --reload main:app

volumes:
  postgres_data:
